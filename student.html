<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的学习伙伴</title>

<style>
:root {
    --primary: #4A90E2;
    --success: #2ECC71;
    --accent: #9D4EDD;
    --dark: #1F2937;
    --gray: #9CA3AF;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei";
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 28px 20px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.pet-avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 0 auto 18px;
    font-size: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
.pet-name {
    font-size: 24px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
}
.pet-type {
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 6px;
}
.level {
    font-size: 18px;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 4px;
}
.stage {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
}
.mood {
    background: #f5f5f5;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 16px;
    color: #555;
    line-height: 1.6;
}
.teacher-comment {
    background: linear-gradient(135deg, rgba(74,144,226,0.1), rgba(157,78,221,0.1));
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    color: var(--primary);
    font-weight: 500;
    line-height: 1.6;
    border-left: 3px solid var(--accent);
    text-align: left;
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 18px;
}
.stat-card {
    background: #fafafa;
    padding: 10px 8px;
    border-radius: 8px;
    border: 1px solid #eee;
}
.stat-label {
    font-size: 11px;
    color: var(--gray);
    margin-bottom: 2px;
}
.stat-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
}
.log-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 8px;
    text-align: left;
}
.log-item {
    text-align: left;
    font-size: 12px;
    padding: 7px 0;
    border-bottom: 1px solid #eee;
    color: #555;
}
.log-item:last-child { border-bottom: none; }
.log-action {
    font-weight: 600;
    color: var(--dark);
}
.log-message {
    color: #666;
    margin-top: 1px;
}
.log-praise {
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
}
.log-time {
    font-size: 10px;
    color: #bbb;
    margin-top: 2px;
}
.error {
    color: #FF4757;
    font-size: 14px;
    padding: 20px;
    line-height: 1.8;
}
.loading {
    color: var(--gray);
    font-size: 14px;
    padding: 20px;
}
.footer {
    margin-top: 16px;
    font-size: 11px;
    color: var(--gray);
}
.footer a {
    color: var(--primary);
    text-decoration: none;
}
.progress-bar {
    width: 100%;
    height: 8px;
    background: #eee;
    border-radius: 4px;
    overflow: hidden;
    margin: 8px 0;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 4px;
    transition: width 0.5s ease;
}
/* 图鉴样式 */
.collection-section {
    margin-top: 18px;
    text-align: left;
}
.collection-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
}
.collection-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.collection-card {
    background: #fafafa;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    border: 2px solid var(--gray-light);
}
.collection-card.maxed {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(157,78,221,0.08), rgba(74,144,226,0.08));
}
.collect-emoji { font-size: 28px; }
.collect-name { font-size: 10px; color: var(--dark); margin-top: 2px; font-weight: 600; }
.collect-badge {
    font-size: 9px; background: var(--accent); color: white;
    padding: 1px 5px; border-radius: 6px; margin-top: 2px; display: inline-block;
}
/* 第二只宠物按钮 */
.new-pet-btn {
    margin-top: 14px;
    background: linear-gradient(135deg, var(--accent), #8A2BE2);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s ease;
}
.new-pet-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(157,78,221,0.4);
}
</style>
</head>

<body>
<div class="card" id="app">
    <div id="content">
        <div style="font-size: 48px; margin-bottom: 12px;">🔐</div>
        <p class="loading">正在读取你的学习伙伴数据…</p>
    </div>
</div>

<script>
// 宠物类型定义（和教师端一致）
const PET_TYPES = {
    cat: { name: '阿伏伽德罗喵', emoji: ['🐱','🐈','🐅','🦁','🐈‍⬛','😺'], color: ['#FFB347','#FF8C42','#FF6B6B','#FF4757','#E74C3C','#C0392B'] },
    dog: { name: '氧化汪', emoji: ['🐶','🐕','🦮','🐺','🐕‍🦺','🐕‍⬛'], color: ['#4ECDC4','#45B7D1','#2E9CCA','#1F77B7','#1A5276','#154360'] },
    dragon: { name: '钠钠龙', emoji: ['🐲','🐉','🐲','🐉','🐲','🐉'], color: ['#96CEB4','#88D8B0','#7BCBAE','#6EC2A8','#5DAE9E','#4D9486'] },
    shrimp: { name: '氯氯虾', emoji: ['🦐','🦐','🦐','🦐','🦐','🦐'], color: ['#FF9A8B','#FF7E5F','#FF6B6B','#FF5A5A','#E74C3C','#C0392B'] },
    rabbit: { name: '镁镁兔', emoji: ['🐰','🐇','🐰','🐇','🐰','🐇'], color: ['#DDA0DD','#DA70D6','#C71585','#BA55D3','#9B59B6','#8E44AD'] },
    panda: { name: '方程式熊猫', emoji: ['🐼','🐼','🐼','🐼','🐼','🐼'], color: ['#A9CCE3','#7FB3D5','#5499C7','#2980B9','#2471A3','#1A5276'] },
    fox: { name: '镁铝狐', emoji: ['🦊','🦊','🦊','🦊','🦊','🦊'], color: ['#FFB347','#FF8C42','#FF6B6B','#FF4757','#E74C3C','#C0392B'] },
    bird: { name: '气体啾', emoji: ['🐦','🐧','🦅','🦅','🦅','🦅'], color: ['#ABEBC6','#82E0AA','#58D68D','#2ECC71','#27AE60','#1E8449'] }
}

const STUDY_ACTIVITIES = {
    note: { name: '课堂笔记' },
    practice: { name: '巩固练习' },
    course: { name: '完成课程' },
    vocabulary: { name: '方程式打卡' },
    dailyQuestion: { name: '每日一题' },
    composition: { name: '班级作业' },
    video: { name: '接听视频' },
    dictation: { name: '元素思维导图' }
}

function getEvolutionStage(level) {
    if(level >= 80) return { stage: 5, text: '💎 化学超能大神', color: '#E74C3C' }
    if(level >= 50) return { stage: 4, text: '👑 元素小王者', color: '#2ECC71' }
    if(level >= 30) return { stage: 3, text: '🔥 反应小先锋', color: '#FF9F43' }
    if(level >= 15) return { stage: 2, text: '🌟 方程式达人', color: '#FF6B6B' }
    if(level >= 5) return { stage: 1, text: '✨ 微粒小能手', color: '#9D4EDD' }
    return { stage: 0, text: '⭐ 化学小萌新', color: '#4A90E2' }
}
const MAX_LEVEL = 100
const STAGE_THRESHOLDS = [0, 5, 15, 30, 50, 80]

function getMood(level) {
    if(level >= 80) return '状态极佳，学习力爆棚 🚀\n我的主人太厉害了！'
    if(level >= 50) return '已经进入学习高手模式 💪\n继续冲，我看好你！'
    if(level >= 30) return '进步飞快，越来越厉害了 🌟\n坚持就是胜利！'
    if(level >= 15) return '正在稳步成长中 ✨\n每一步都算数！'
    if(level >= 5) return '刚刚起步，加油哦 💡\n我会陪你一起进步！'
    return '等待主人带我升级 🌱\n快来学习吧！'
}

function showError(msg) {
    document.getElementById('content').innerHTML = `
        <div class="error">
            ⚠️ ${msg}<br><br>
            <span style="font-size:12px; color:#999;">请检查链接是否完整，或联系老师获取正确链接</span>
        </div>
    `
}

// ============ 云端配置 ============
const JSONBIN_API_KEY = '$2a$10$WS6YT56shk8/9DD2C/KJY.z2ihUfIIlGnRy/gTdiXmYPESq9cQ256'
const JSONBIN_BIN_ID = '6a2e6ad9da38895dfebdafcf'
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`

// ============ 从 URL 参数读取 ============
const params = new URLSearchParams(window.location.search)
const teacherName = params.get('teacher')   // 新增：老师名
const studentName = params.get('name')
const studentClass = params.get('class')
const encodedData = params.get('data')     // 兼容旧版

// ============ 主逻辑 ============
if (encodedData) {
    // 兼容旧版 data= 编码链接
    try {
        const decoded = decodeURIComponent(escape(atob(decodeURIComponent(encodedData))))
        const student = JSON.parse(decoded)
        if (student && student.name) {
            renderStudentPet(student, [])
        } else {
            showError('链接数据格式有误，请联系老师重新生成链接')
        }
    } catch(e) {
        showError('链接解析失败，请联系老师重新生成链接')
    }
} else if ((teacherName && studentName && studentClass) || (studentName && studentClass)) {
    // 有 teacher 参数 或 仅有 name+class，都从云端读取
    const targetTeacher = teacherName || ''
    showLoading('正在连接老师的数据…')
    fetch(JSONBIN_URL, {
        headers: { 'X-Access-Key': JSONBIN_API_KEY }
    })
    .then(response => {
        if(!response.ok) throw new Error('读取失败')
        return response.json()
    })
    .then(result => {
        const allData = result.record || {}
        let students = []
        let collection = []

        if (allData.teachers) {
            // 新格式：按老师分数据
            if (targetTeacher && allData.teachers[targetTeacher]) {
                students = allData.teachers[targetTeacher].students || []
                collection = allData.teachers[targetTeacher].collection || []
            } else if (targetTeacher && !allData.teachers[targetTeacher]) {
                // 指定了老师但找不到，先尝试在所有老师数据中找该学生
                let found = false
                for (const tName in allData.teachers) {
                    const s = (allData.teachers[tName].students || []).find(
                        s => s.name === studentName && s.class === studentClass
                    )
                    if (s) {
                        students = allData.teachers[tName].students
                        collection = allData.teachers[tName].collection || []
                        found = true
                        break
                    }
                }
                // 如果所有老师数据中都找不到，再尝试顶层旧格式 students
                if (!found && allData.students && allData.students.length > 0) {
                    const s = allData.students.find(
                        s => s.name === studentName && s.class === studentClass
                    )
                    if (s) {
                        students = allData.students
                        collection = []
                        found = true
                    }
                }
                if (!found) {
                    showError(`未找到「${targetTeacher}」老师的数据<br><br>
                        <span style="font-size:12px;color:#999;">
                            可能是老师还没同步数据到云端，或者老师姓名有变化<br>
                            请让老师确认姓名后重新同步
                        </span>`)
                    return
                }
            } else if (!targetTeacher) {
                // 旧链接没有 teacher 参数，遍历所有老师找学生
                let found = false
                for (const tName in allData.teachers) {
                    const s = (allData.teachers[tName].students || []).find(
                        s => s.name === studentName && s.class === studentClass
                    )
                    if (s) { students = allData.teachers[tName].students; collection = allData.teachers[tName].collection || []; found = true; break }
                }
                // 也尝试顶层旧格式
                if (!found && allData.students && allData.students.length > 0) {
                    const s = allData.students.find(
                        s => s.name === studentName && s.class === studentClass
                    )
                    if (s) { students = allData.students; collection = []; found = true }
                }
                if (!found) {
                    showError(`未找到你的学习伙伴<br><br>
                        <span style="font-size:12px;color:#999;">
                            姓名：${studentName}　班级：${studentClass}<br>
                            请确认链接是否正确，或让老师先同步数据到云端
                        </span>`)
                    return
                }
            }
        } else if (allData.students) {
            // 旧格式：没有 teachers 键，直接就是 students 数组
            students = allData.students
            collection = []
        }

        const student = students.find(s => s.name === studentName && s.class === studentClass)

        if (!student) {
            showError(`未找到你的学习伙伴<br><br>
                <span style="font-size:12px;color:#999;">
                    姓名：${studentName}　班级：${studentClass}<br>
                    ${targetTeacher ? '老师：' + targetTeacher + '<br>' : ''}<br>
                    请确认链接是否正确，或让老师先同步数据到云端
                </span>`)
            return
        }

        renderStudentPet(student, collection)
    })
    .catch(err => {
        showError('无法读取云端数据，请检查网络连接后刷新页面重试<br><br>' +
            '<span style="font-size:12px;color:#999;">如果持续无法加载，请联系老师确认是否已同步数据到云端</span>')
    })
} else {
    showError('链接不完整，请联系老师获取正确的专属链接')
}

function showLoading(msg) {
    document.getElementById('content').innerHTML = `
        <div style="font-size:48px;margin-bottom:12px;">🔐</div>
        <p class="loading">${msg}</p>
    `
}

// ============ 渲染学生宠物页面 ============
function renderStudentPet(student, collection) {
    const pet = student.pet
    const petType = PET_TYPES[pet.type] || PET_TYPES.cat
    const stage = getEvolutionStage(pet.level)
    const emoji = petType.emoji[stage.stage]
    const color = petType.color[stage.stage]
    const mood = getMood(pet.level)

    // 计算总学习次数
    let totalStudy = 0
    if (pet.studyStats) {
        Object.values(pet.studyStats).forEach(v => totalStudy += (v || 0))
    }

    // 计算进化进度
    const currentThreshold = STAGE_THRESHOLDS[stage.stage]
    const nextThreshold = stage.stage < 5 ? STAGE_THRESHOLDS[stage.stage + 1] : null
    let progressHtml = ''
    if (pet.level < MAX_LEVEL) {
        if (nextThreshold) {
            const progress = ((pet.level - currentThreshold) / (nextThreshold - currentThreshold)) * 100
            progressHtml = `
                <div style="margin-top:8px;">
                    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:3px;">
                        <span>进化进度</span>
                        <span>${pet.level}/${nextThreshold}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${Math.min(progress,100)}%"></div>
                    </div>
                </div>
            `
        }
    } else {
        progressHtml = `<div style="margin-top:8px;font-size:12px;color:var(--accent);font-weight:600;">🏆 已满级（Lv.${MAX_LEVEL}）！</div>`
    }

    // 学习记录（显示表扬语）
    const actionNames = {
        note: '📝 笔记', practice: '📖 练习', course: '✅ 完课',
        vocabulary: '🔤 方程式打卡', dailyQuestion: '❓ 每日一题',
        composition: '✍️ 班级作业', video: '📺 接听视频',
        dictation: '🎧 思维导图'
    }

    let logHtml = ''
    if (pet.growthLog && pet.growthLog.length > 0) {
        const recentLogs = pet.growthLog.slice(0, 20)
        recentLogs.forEach(log => {
            const an = actionNames[log.action] || '✨ 学习'
            const praiseHtml = log.praise ? `<div class="log-praise">🎉 ${log.praise}</div>` : ''
            logHtml += `
                <div class="log-item">
                    <div class="log-action">${an}</div>
                    <div class="log-message">${log.message || ''}</div>
                    ${praiseHtml}
                    <div class="log-time">${log.timestamp || ''}</div>
                </div>
            `
        })
    } else {
        logHtml = '<div style="color:#ccc;font-size:12px;text-align:center;padding:10px;">暂无学习记录，快去完成任务吧！</div>'
    }

    // 教师寄语
    let commentHtml = ''
    if (pet.teacherComment && pet.teacherComment.trim()) {
        commentHtml = `
            <div class="teacher-comment">
                💬 老师对你说：<br>
                「${pet.teacherComment}」
            </div>
        `
    }

    // 我的图鉴（只显示该学生自己收集/满级的宠物）
    let collectionHtml = ''
    const myCollection = (collection || []).filter(item => item.studentName === studentName)
    if (myCollection.length > 0) {
        let cardsHtml = ''
        myCollection.forEach(item => {
            const t = PET_TYPES[item.petType] || PET_TYPES.cat
            cardsHtml += `
                <div class="collection-card maxed">
                    <div class="collect-emoji">${t.emoji[5] || '🏆'}</div>
                    <div class="collect-name">${item.petName}</div>
                    <span class="collect-badge">🏆 已收集</span>
                </div>
            `
        })
        collectionHtml = `
            <div class="collection-section">
                <div class="collection-title">🏆 我的宠物图鉴</div>
                <div class="collection-grid">${cardsHtml}</div>
            </div>
        `
    } else {
        collectionHtml = `
            <div class="collection-section">
                <div class="collection-title">🏆 我的宠物图鉴</div>
                <div style="color:#ccc;font-size:12px;text-align:center;padding:16px;background:#fafafa;border-radius:8px;">
                    暂无收集，快去把宠物养到满级吧！🎉
                </div>
            </div>
        `
    }

    // 第二只宠物按钮（满级后可选择新宠物）
    let newPetHtml = ''
    if (pet.level >= MAX_LEVEL || pet.maxLevelReached) {
        // 生成宠物选择列表
        let petOptionsHtml = ''
        Object.keys(PET_TYPES).forEach(type => {
            const pt = PET_TYPES[type]
            petOptionsHtml += `<option value="${type}">${pt.emoji[0]} ${pt.name}</option>`
        })
        newPetHtml = `
            <div style="margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(157,78,221,0.08),rgba(74,144,226,0.08));border-radius:12px;border:1px solid rgba(157,78,221,0.2);">
                <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:10px;">🎉 恭喜满级！可以开启第二只宠物！</div>
                <select id="newPetSelect" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;background:white;">
                    ${petOptionsHtml}
                </select>
                <button class="new-pet-btn" onclick="startNewPet()">
                    🐣 开启新宠物养成之旅
                </button>
            </div>
        `
    }

    document.getElementById('content').innerHTML = `
        <div class="pet-avatar" style="background:linear-gradient(135deg,${color},#FFD166);">
            ${emoji}
        </div>
        <div class="pet-name">${pet.name}</div>
        <div class="pet-type">${emoji} ${petType.name}</div>
        <div class="level">Lv.${pet.level}　成长值：${pet.level}</div>
        <div class="stage" style="color:${stage.color};">${stage.text}</div>

        <div class="mood">${mood.replace('\n','<br>')}</div>

        ${commentHtml}

        <div style="background:#f5f5f5;padding:10px;border-radius:10px;margin-bottom:16px;font-size:13px;color:#555;">
            📊 累计学习 ${totalStudy} 次
        </div>

        ${progressHtml}

        <div style="margin-top:18px;">
