// ============ 核心：从腾讯云 CloudBase 读取并渲染 ============
async function fetchAndRender(targetTeacher, studentNameQuery) {
    document.getElementById('content').innerHTML = `
        <div style="font-size:48px;margin-bottom:12px;animation:pulse 1s infinite;">🔄</div>
        <p class="loading">正在读取 ${targetTeacher} 的数据…</p>
    `

    // 优先从 CloudBase 读取
    let students = []
    let collection = []
    let cloudBaseOK = false

    try {
        await ensureCloudAuth()  // 先确保已登录
        const db = getCbDb()
        const res = await db.collection(TEACHERS_COLLECTION).doc(targetTeacher).get()
        // CloudBase doc().get() 返回 { data: [...] }，data 是数组
        const data = (res.data && res.data.length > 0) ? res.data[0] : null
        if (data && data.students) {
            students = data.students || []
            collection = data.collection || []
            cloudBaseOK = true
        }
    } catch(err) {
        console.warn('CloudBase 读取失败:', err)
    }

    // CloudBase 没找到，降级到 JSONBin
    if (!cloudBaseOK) {
        try {
            const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`
            const res = await fetch(JSONBIN_URL, {
                headers: { 'X-Access-Key': JSONBIN_API_KEY }
            })
            if (res.ok) {
                const result = await res.json()
                const allData = result.record || {}
                if (allData.teachers && allData.teachers[targetTeacher]) {
                    students = allData.teachers[targetTeacher].students || []
                    collection = allData.teachers[targetTeacher].collection || []
                } else if (allData.teachers) {
                    // 找不到精确老师名，遍历所有老师找该学生名
                    for (const tName in allData.teachers) {
                        const s = (allData.teachers[tName].students || []).find(
                            s => s.name === studentNameQuery
                        )
                        if (s) {
                            students = allData.teachers[tName].students || []
                            collection = allData.teachers[tName].collection || []
                            break
                        }
                    }
                } else if (allData.students) {
                    students = allData.students
                    collection = []
                }
            }
        } catch(e) {
            console.warn('JSONBin 降级也失败:', e)
        }
    }

    // 两个数据源都没数据
    if (students.length === 0 && !cloudBaseOK) {
        showError(`没有找到「${targetTeacher}」老师的数据<br>
            <span style="font-size:12px;color:#999;line-height:2;">
                请检查老师名是否正确（比如"菲菲老师"）<br>
                或让老师在教师端同步数据后再试
            </span>`)
        return
    }

    const student = students.find(s => s.name === studentNameQuery)

    if (!student) {
        showError(`在「${targetTeacher}」的班级里找不到「${studentNameQuery}」<br>
            <span style="font-size:12px;color:#999;line-height:2;">
                请确认名字是否正确，或让老师检查学生名单
            </span>`)
        setTimeout(() => showQueryForm(targetTeacher, studentNameQuery), 2000)
        return
    }

    renderStudentPet(student, collection)
}

        const decoded = decodeURIComponent(escape(atob(decodeURIComponent(encodedData))))
        const student = JSON.parse(decoded)
        if (student && student.name) {
            renderStudentPet(student, [])
        } else {
            showQueryForm()
        }
    } catch(e) {
        showQueryForm()
    }
} else if (teacherName && studentName) {
    // 旧版带参数链接：直接查询
    fetchAndRender(teacherName, studentName)
} else if (studentName) {
    // 只有学生名，显示表单并预填
    showQueryForm('', studentName)
} else {
    // 没有任何参数：显示查询表单（统一入口）
    showQueryForm()
}


// ============ 渲染学生宠物页面 ============
function buildStudentInfoHtml(student) {
    let infoItems = []
    if (student.liveType) infoItems.push(`<span style="background:#E8F5E9;color:#2E7D32;padding:3px 10px;border-radius:12px;font-size:11px;">🏠 ${student.liveType}</span>`)
    if (student.homeTime) infoItems.push(`<span style="font-size:11px;color:#666;">🕐 在家：${student.homeTime}</span>`)
    if (student.examTotal || student.examChemRaw || student.examChemAssigned) {
        let examStr = '📊 考试：'
        if (student.examTotal) examStr += `总分${student.examTotal}`
        if (student.examChemRaw) examStr += ` / 化学${student.examChemRaw}`
        if (student.examChemAssigned) examStr += ` / 赋分${student.examChemAssigned}`
        infoItems.push(`<span style="font-size:11px;color:#666;">${examStr}</span>`)
    }
    if (student.weakAreas) infoItems.push(`<span style="font-size:11px;color:#E65100;">⚠️ 弱势：${student.weakAreas}</span>`)
    if (student.shuangwei) infoItems.push(`<span style="font-size:11px;color:#666;">📱 双微：${student.shuangwei}</span>`)
    if (student.preview) infoItems.push(`<span style="font-size:11px;color:#666;">📖 预习：${student.preview}</span>`)
    if (student.liveClass) infoItems.push(`<span style="font-size:11px;color:#666;">🖥️ 直播课：${student.liveClass}</span>`)

    let contactHtml = ''
    if (student.contactLog && student.contactLog.length > 0) {
        contactHtml = `
            <div style="margin-top:8px;padding:8px;background:#FFF8E1;border-radius:8px;border:1px solid #FFE082;">
                <div style="font-size:11px;color:#F57F17;font-weight:600;margin-bottom:4px;">📝 沟通记录</div>
                ${student.contactLog.map(l => `<div style="font-size:10px;color:#666;margin-bottom:2px;">${l.timestamp} - ${l.content}</div>`).join('')}
            </div>
        `
    }

    if (infoItems.length === 0 && !contactHtml) return ''
    return `
        <div style="margin-top:14px;padding:12px;background:linear-gradient(135deg,rgba(74,144,226,0.04),rgba(157,78,221,0.04));border-radius:12px;border:1px solid rgba(74,144,226,0.1);">
            <div style="font-size:12px;font-weight:600;color:var(--primary);margin-bottom:8px;">📋 我的信息</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${infoItems.join('')}
            </div>
            ${contactHtml}
        </div>
    `
}

function renderStudentPet(student, collection) {
    const pet = student.pet
    const petType = PET_TYPES[pet.type] || PET_TYPES.cat
    const stage = getEvolutionStage(pet.level)
    const emoji = petType.emoji[stage.stage]
    const color = petType.color[stage.stage]
    const mood = getMood(pet.level)

    // 计算总学习次数
    let totalStudy = 0
    if (pet.studyStats) {
        Object.values(pet.studyStats).forEach(v => totalStudy += (v || 0))
    }

    // 计算进化进度
    const currentThreshold = STAGE_THRESHOLDS[stage.stage]
    const nextThreshold = stage.stage < 5 ? STAGE_THRESHOLDS[stage.stage + 1] : null
    let progressHtml = ''
    if (pet.level < MAX_LEVEL) {
        if (nextThreshold) {
            const progress = ((pet.level - currentThreshold) / (nextThreshold - currentThreshold)) * 100
            progressHtml = `
                <div style="margin-top:8px;">
                    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:3px;">
                        <span>进化进度</span>
                        <span>${pet.level}/${nextThreshold}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${Math.min(progress,100)}%"></div>
                    </div>
                </div>
            `
        }
    } else {
        progressHtml = `<div style="margin-top:8px;font-size:12px;color:var(--accent);font-weight:600;">🏆 已满级（Lv.${MAX_LEVEL}）！</div>`
    }

    // 学习记录（显示表扬语）
    const actionNames = {
        note: '📝 笔记', practice: '📖 练习', course: '✅ 完课',
        vocabulary: '🔤 方程式打卡', dailyQuestion: '❓ 每日一题',
        composition: '✍️ 班级作业', video: '📺 接听视频',
        dictation: '🎧 思维导图'
    }

    let logHtml = ''
    if (pet.growthLog && pet.growthLog.length > 0) {
        const recentLogs = pet.growthLog.slice(0, 20)
        recentLogs.forEach(log => {
            const an = actionNames[log.action] || '✨ 学习'
            const praiseHtml = log.praise ? `<div class="log-praise">🎉 ${log.praise}</div>` : ''
            logHtml += `
                <div class="log-item">
                    <div class="log-action">${an}</div>
                    <div class="log-message">${log.message || ''}</div>
                    ${praiseHtml}
                    <div class="log-time">${log.timestamp || ''}</div>
                </div>
            `
        })
    } else {
        logHtml = '<div style="color:#ccc;font-size:12px;text-align:center;padding:10px;">暂无学习记录，快去完成任务吧！</div>'
    }

    // 教师寄语
    let commentHtml = ''
    if (pet.teacherComment && pet.teacherComment.trim()) {
        commentHtml = `
            <div class="teacher-comment">
                💬 老师对你说：<br>
                「${pet.teacherComment}」
            </div>
        `
    }

    // 我的图鉴（只显示该学生自己收集/满级的宠物）
    let collectionHtml = ''
    const myCollection = (collection || []).filter(item => item.studentName === studentName)
    if (myCollection.length > 0) {
        let cardsHtml = ''
        myCollection.forEach(item => {
            const t = PET_TYPES[item.petType] || PET_TYPES.cat
            cardsHtml += `
                <div class="collection-card maxed">
                    <div class="collect-emoji">${t.emoji[5] || '🏆'}</div>
                    <div class="collect-name">${item.petName}</div>
                    <span class="collect-badge">🏆 已收集</span>
                </div>
            `
        })
        collectionHtml = `
            <div class="collection-section">
                <div class="collection-title">🏆 我的宠物图鉴</div>
                <div class="collection-grid">${cardsHtml}</div>
            </div>
        `
    } else {
        collectionHtml = `
            <div class="collection-section">
                <div class="collection-title">🏆 我的宠物图鉴</div>
                <div style="color:#ccc;font-size:12px;text-align:center;padding:16px;background:#fafafa;border-radius:8px;">
                    暂无收集，快去把宠物养到满级吧！🎉
                </div>
            </div>
        `
    }

    // 第二只宠物按钮（满级后可选择新宠物）
    let newPetHtml = ''
    if (pet.level >= MAX_LEVEL || pet.maxLevelReached) {
        // 生成宠物选择列表
        let petOptionsHtml = ''
        Object.keys(PET_TYPES).forEach(type => {
            const pt = PET_TYPES[type]
            petOptionsHtml += `<option value="${type}">${pt.emoji[0]} ${pt.name}</option>`
        })
        newPetHtml = `
            <div style="margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(157,78,221,0.08),rgba(74,144,226,0.08));border-radius:12px;border:1px solid rgba(157,78,221,0.2);">
                <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:10px;">🎉 恭喜满级！可以开启第二只宠物！</div>
                <select id="newPetSelect" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;background:white;">
                    ${petOptionsHtml}
                </select>
                <button class="new-pet-btn" onclick="startNewPet()">
                    🐣 开启新宠物养成之旅
                </button>
            </div>
        `
    }

    document.getElementById('content').innerHTML = `
        <div class="pet-avatar" style="background:linear-gradient(135deg,${color},#FFD166);">
            ${emoji}
        </div>
        <div class="pet-name">${pet.name}</div>
        <div class="pet-type">${emoji} ${petType.name}</div>
        <div class="level">Lv.${pet.level}　成长值：${pet.level}</div>
        <div class="stage" style="color:${stage.color};">${stage.text}</div>

        <div class="mood">${mood.replace('\n','<br>')}</div>

        ${commentHtml}

        <div style="background:#f5f5f5;padding:10px;border-radius:10px;margin-bottom:16px;font-size:13px;color:#555;">
            📊 累计学习 ${totalStudy} 次
        </div>

        ${progressHtml}

        ${buildStudentInfoHtml(student)}

        <div style="margin-top:18px;">
            <div class="log-title">📝 最近学习记录</div>
            <div style="max-height:220px;overflow-y:auto;">${logHtml}</div>
        </div>

        ${collectionHtml}

        ${newPetHtml}

        <div class="footer">
            学习伴侣 · 好课在线 · 好老师 提升快<br>
            <span style="font-size:10px;color:#bbb;">数据由老师端同步更新，刷新页面可获取最新数据</span>
        </div>
    `
}

// 开启新宠物：提示学生联系老师操作
function startNewPet() {
    alert('🎉 请联系老师，让老师帮你开启第二只宠物！\n\n老师端可以选择新的宠物类型并重置等级，你就可以从1级开始养新宠物啦～')
}
</script>
